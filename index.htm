<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE OpenEnv Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
        }
    }
    </script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-black text-white">
    <div id="canvas-container"></div>

    <!-- HUD Overlay -->
    <div class="relative z-10 p-8 flex flex-col gap-6 w-80">
        <div class="glass rounded-2xl p-6 shadow-2xl">
            <h2 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-1">System Health Reward</h2>
            <div class="flex items-end gap-2">
                <span id="reward-value" class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500">1.00</span>
                <span class="text-gray-500 text-sm mb-1">/ 1.0</span>
            </div>
            <div class="mt-4 w-full h-1 bg-white/5 rounded-full overflow-hidden">
                <div id="reward-progress" class="h-full bg-gradient-to-r from-green-400 to-blue-500 transition-all duration-500" style="width: 100%"></div>
            </div>
        </div>

        <div class="glass rounded-2xl p-6 shadow-2xl">
            <h2 class="text-gray-400 text-xs font-bold uppercase tracking-widest mb-3">Live Log</h2>
            <div id="event-log" class="flex flex-col gap-2 overflow-y-auto max-h-48 text-[10px] font-mono text-gray-400">
                <div>[SYSTEM] Established connection to OpenEnv...</div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-10 flex flex-col items-center gap-4">
        <div class="flex gap-4 mb-4">
            <button onclick="resetTask(1)" class="px-4 py-2 glass hover:bg-blue-500/20 rounded-lg text-[10px] font-bold uppercase transition-all">Easy</button>
            <button onclick="resetTask(2)" class="px-4 py-2 glass hover:bg-yellow-500/20 rounded-lg text-[10px] font-bold uppercase transition-all">Medium</button>
            <button onclick="resetTask(3)" class="px-4 py-2 glass hover:bg-red-500/20 rounded-lg text-[10px] font-bold uppercase transition-all">Hard</button>
        </div>
        <div id="service-controls" class="flex gap-6">
            <!-- Dynamic Controls -->
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const API_URL = 'http://localhost:7860';
        let scene, camera, renderer, controls, grid;
        const monoliths = {};

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);

            const point = new THREE.PointLight(0xffffff, 10);
            point.position.set(10, 10, 10);
            scene.add(point);

            grid = new THREE.GridHelper(50, 50, 0x00d2ff, 0x00d2ff);
            grid.position.y = -1;
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
            startPolling();
        }

        function createMonolith(name, x) {
            const geometry = new THREE.BoxGeometry(1, 1.5, 1);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x4e54ff, 
                emissive: 0x4e54ff, 
                emissiveIntensity: 1.5,
                metalness: 0.9,
                roughness: 0.1,
                transparent: true,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x, 0, 0);
            scene.add(mesh);
            return mesh;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            Object.values(monoliths).forEach((m, idx) => {
                m.position.y = Math.sin(Date.now() * 0.001 + idx) * 0.1;
                // m.rotation.y += 0.01;
            });

            renderer.render(scene, camera);
        }

        async function startPolling() {
            setInterval(async () => {
                try {
                    const res = await fetch(`${API_URL}/state`);
                    const data = await res.json();
                    
                    const resReward = await fetch(`${API_URL}/reward`);
                    const rewardData = await resReward.json();

                    updateUI(data, rewardData.reward);
                    updateScene(data.services);
                } catch (e) {
                    console.error("API Unreachable", e);
                }
            }, 1000);
        }

        function updateUI(data, reward) {
            document.getElementById('reward-value').innerText = reward.toFixed(2);
            document.getElementById('reward-progress').style.width = (reward * 100) + '%';
            
            const controlsDiv = document.getElementById('service-controls');
            controlsDiv.innerHTML = data.services.map(s => `
                <div class="flex flex-col items-center gap-2">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">${s.name}</span>
                    <div class="flex gap-2">
                        <button onclick="sendAction('restart_service', '${s.name}')" class="px-3 py-1 glass hover:bg-green-500/20 rounded-md text-[9px] font-bold">RESTART</button>
                        <button onclick="sendAction('kill_process', '${s.name}')" class="px-3 py-1 glass hover:bg-red-500/20 rounded-md text-[9px] font-bold border-red-500/30 text-red-400">KILL</button>
                    </div>
                </div>
            `).join('');
        }

        function updateScene(services) {
            services.forEach((s, idx) => {
                if (!monoliths[s.name]) {
                    monoliths[s.name] = createMonolith(s.name, (idx - 1) * 3);
                }
                const m = monoliths[s.name];
                
                // Color Logic
                let color = 0x00ff41; // Green
                let intensity = 1.5;

                if (s.status === 'ERROR') {
                    color = 0xff003c; // Red
                    intensity = Math.sin(Date.now() * 0.01) * 1.5 + 1.5;
                } else if (s.status === 'OFFLINE') {
                    color = 0x444444; // Gray
                    intensity = 0.2;
                }

                m.material.color.setHex(color);
                m.material.emissive.setHex(color);
                m.material.emissiveIntensity = intensity;
            });
        }

        window.sendAction = async (type, target) => {
            await fetch(`${API_URL}/step`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, target })
            });
        };

        window.resetTask = async (id) => {
            await fetch(`${API_URL}/reset?task_id=${id}`, { method: 'POST' });
        };

        init();
    </script>
</body>
</html>
